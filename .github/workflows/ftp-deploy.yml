name: Deploy

on:
  push:
    branches:
      - demo
      - main

jobs:
  deploy-demo:
    name: FTP Deploy (Demo)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/demo'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: /event-engagement.my-board.org/htdocs/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/storage/logs/**
            **/.env

  deploy-production:
    name: SSH Deploy (Production)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via SSH (rsync)
        env:
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          sshpass -e rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            --exclude='.git*' \
            --exclude='node_modules/' \
            --exclude='storage/logs/' \
            --exclude='.env' \
            ./ leuzfnqd@host268.checkdomain.de:~/showmeonscreen.com/